[Settings]
Volume=0.7 ; Global volume multiplier

[Toggle]
HitSprite = 1 ; Enable the Hitmarker Sprite
HitSound = 1 ; Enable the Hitmarker Sound
HitSoundvar = 1 ; Enable the Hitmarker sounds varation (Disabling this will make it so only hit1.wav is used for the hitsounds).
HSSound = 1 ; Enable the Headshot Sound
HSSoundvar = 1 ; Enable the Headshot sounds varation (Disabling this will make it so only headshot1.wav is used for the hitsounds).
KillSound = 1; Enable Kill Sound