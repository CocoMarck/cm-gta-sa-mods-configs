[Controls]

IncreaseKey = 190	# (190) Key to increase the volume on the keyboard. "." by default.
DecreaseKey = 188	# (188) Key to decrease the volume on the keyboard. "," by default.
TurnOffKey = 88		# (88) Key to quickly turn off the radio, or turn it back on if already off. "X" by default.

[Interface]

DisplayTextSprite = 1	# (0|1) Displays the current volume value.
PlaySounds = 1		# (0|1) Plays interface sounds when changing the volume.
AnyVehicle = 0          # (0|1) Enables in any vehicle (bicycles, police cars etc).

PositionX = 320.0	# (320.0) Horizontal position of the volume text/sprite.
PositionY = 50.0	# (50.0) Vertical position of the volume text/sprite.
SizeMultiplier = 1.0	# (1.0) Size multiplier of the volume text/sprite.

SpriteBorder = 1	# (1) Size of the sprite and text border. "1" by default. Setting it to 0 won't create borders.

SpriteA = 255		# (255) Sprite and text transparency.
SpriteR = 220		# (220) Red value of the sprite and text color.
SpriteG = 220		# (220) Green value of the sprite and text color.
SpriteB = 220		# (220) Blue value of the sprite and text color.

BorderA = 255		# (255) Sprite and text border transparency.
BorderR = 0		# (0) Red value of the sprite and text border color.
BorderG = 0		# (0) Green value of the sprite and text border color.
BorderB = 0		# (0) Blue value of the sprite and text border color.



