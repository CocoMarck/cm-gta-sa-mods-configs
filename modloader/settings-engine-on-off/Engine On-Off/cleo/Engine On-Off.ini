[Settings] # If this .ini will not be loaded, will use the mod default settings.
Key = 84                 # Key to activate — www.mixmods.com.br/p/virtual-keys-br.html (e.g. 84 = "T")
JoypadKey = 8            # Button to activate if is using Joypad/Joystick — www.gtamodding.com/wiki/00E1#Joypads  (e.g., "8" is "DPADUP" which is up button, as so "10" is for left etc)
Delay = 300              # Command delay in milliseconds (for some realism).
ApAutoEngineTurnOn = 1   # Disable it (0) for, when entering the car, will be necessary to start the engine manually.
